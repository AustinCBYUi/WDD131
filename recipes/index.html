<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeBook</title>

    <meta property="og:type" content="website">
    <meta property="og:title" content="RecipeBook">
    <meta property="og:description" content="A simple recipe page featuring apple crisp and other favorite recipes.">
    <meta property="og:url" content="https://githubusername.github.io/wdd131/recipes">
    <meta property="og:image" content="images/social-preview-image.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="RecipeBook">
    <meta name="twitter:description" content="A simple recipe page featuring apple crisp and other favorite recipes.">
    <meta name="twitter:image" content="images/social-preview-image.png">

    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="page">
        <header class="site-header">
            <div class="logo-title">
                <img src="images/recipe-book.png" alt="Recipe book icon" class="logo">
                <h1>RecipeBook</h1>
            </div>
        </header>

        <section class="search-area">
            <label for="recipe-search" class="visually-hidden">Find a recipe</label>
            <input type="text" id="recipe-search" placeholder="Find a recipe">
            <button type="button" aria-label="Search">
                <img src="images/search-icon.png" alt="Search">
            </button>
        </section>

        <section class="recipe-card">
            <img src="images/apple-crisp.jpg" alt="Apple crisp with ice cream" class="recipe-image">

            <div class="recipe-info">
                <span class="tag">dessert</span>

                <h2>Apple Crisp</h2>

                <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star">⭐</span>
                    <span aria-hidden="true" class="icon-star-empty">☆</span>
                </span>

                <p class="description">
                This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with vanilla ice cream.
                </p>
            </div>
        </section>

        <footer>
            <a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">
                Recipe icons created by Freepik - Flaticon
            </a>

            <div class="social">
                <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates -->
                <a href="#"><img src="images/instagram-icon.png" alt="instagram icon"></a>
                <a href="#"><img src="images/youtube-icon.png" alt="youtube icon"></a>
                <a href="#"><img src="images/pinterest-icon.png" alt="pinterest icon"></a>
            </div>
        </footer>
    </main>
</body>
</html>
